<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        #chat-container { width: 90%; max-width: 400px; height: 80vh; background: white; display: flex; flex-direction: column; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        #name-select { padding: 10px; border: 1px solid #ddd; margin: 10px; border-radius: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .sender-name { font-size: 10px; color: #666; margin-bottom: 2px; }
       .my-msg { 
    background: #007bff; 
    color: white; 
    align-self: flex-end; 
    border-bottom-right-radius: 2px; 
}
.my-msg .sender-name { 
    color: #e0e0e0; /* Màu trắng nhạt cho tên trong khung xanh */
    font-size: 10px;
}
.other-msg .sender-name {
    color: #666; /* Màu xám đậm cho tên trong khung xám */
    font-size: 10px;
}
        .other-msg { background: #e4e6eb; color: #050505; align-self: flex-start; }
        #form { display: flex; padding: 15px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .btn-send { margin-left: 10px; padding: 0 15px; height: 40px; border-radius: 25px; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <!-- Dropdown chọn tên -->
        <select id="name-select">
            <option value="">-- Chọn tên của bạn --</option>
            <option value="Khang">Khang</option>
            <option value="Tri">Tri</option>
            <option value="An">An</option>
        </select>

        <div id="messages"></div>
        <div id="form">
            <input type="file" id="fileInput" style="display:none" onchange="sendFile(event)">
            <span onclick="document.getElementById('fileInput').click()" style="cursor:pointer; padding-right:10px">📎</span>
            <input id="input" placeholder="Nhập tin nhắn..." />
            <button class="btn-send" onclick="send()">Gửi</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myId = Math.random().toString(36).substr(2, 9);
        
        function send() {
            const name = document.getElementById('name-select').value;
            if(!name) return alert("Vui lòng chọn tên trước!");
            const input = document.getElementById('input');
            if (input.value.trim() !== "") { 
                socket.emit('chat message', { id: myId, senderName: name, text: input.value }); 
                input.value = ''; 
            }
        }

        function sendFile(event) {
            const name = document.getElementById('name-select').value;
            if(!name) return alert("Vui lòng chọn tên trước!");
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => socket.emit('chat message', { id: myId, senderName: name, file: e.target.result, fileName: file.name, isImg: file.type.startsWith('image/') });
            reader.readAsDataURL(file);
        }

        function appendMessage(data) {
            const msgBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + (data.id === myId ? 'my-msg' : 'other-msg');
            div.innerHTML = `<div class="sender-name">${data.senderName}</div>` + 
                (data.file ? (data.isImg ? `<img src="${data.file}" style="max-width:100%">` : `<a href="${data.file}" download="${data.fileName}">📎 ${data.fileName}</a>`) : `<div>${data.text}</div>`);
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        socket.on('chat message', appendMessage);
        socket.on('load history', (messages) => {
    const msgBox = document.getElementById('messages');
    msgBox.innerHTML = ''; // XÓA SẠCH danh sách cũ trước khi load cái mới
    
    messages.forEach(data => {
        appendMessage(data);
    });
});
// Đảm bảo đoạn này nằm trong <script> ở cuối file index.html
document.getElementById('input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        send();
    }
});
    </script>
</body>
</html>
