<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #f0f2f5;
        }
        #chat-container {
            width: 90%; max-width: 400px; height: 80vh; background: white;
            display: flex; flex-direction: column; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;
        }
        #messages { 
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 10px; }

        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 14px; word-wrap: break-word; }
        .my-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other-msg { background: #e4e6eb; color: #050505; align-self: flex-start; border-bottom-left-radius: 2px; }
        .img-msg { padding: 5px; border-radius: 15px; max-width: 100%; }
        
        #form { display: flex; padding: 15px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .btn-send { margin-left: 10px; padding: 0 15px; height: 40px; border-radius: 25px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        .btn-img { padding: 0 10px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="form">
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
            <span class="btn-img" onclick="document.getElementById('imageInput').click()">🖼️</span>
            <input id="input" placeholder="Nhập tin nhắn..." autocomplete="off" />
            <button class="btn-send" onclick="send()">Gửi</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myId = Math.random().toString(36).substr(2, 9);
        const originalTitle = "Chat App";
        let isPageVisible = true;
        let blinkInterval = null;

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                isPageVisible = true;
                clearInterval(blinkInterval);
                blinkInterval = null;
                document.title = originalTitle;
            } else {
                isPageVisible = false;
            }
        });

        function send() {
            const input = document.getElementById('input');
            if (input.value.trim() !== "") {
                socket.emit('chat message', { id: myId, text: input.value });
                input.value = '';
            }
        }

        function sendImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                socket.emit('chat message', { id: myId, image: e.target.result });
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') send(); 
        });

        socket.on('chat message', (data) => {
            const msgBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + (data.id === myId ? 'my-msg' : 'other-msg');
            
            if (data.image) {
                div.innerHTML = `<img src="${data.image}" class="img-msg">`;
            } else {
                div.textContent = data.text;
            }
            
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;

            if (!isPageVisible && data.id !== myId) {
                if (!blinkInterval) {
                    let toggle = false;
                    blinkInterval = setInterval(() => {
                        document.title = toggle ? "(!) Tin nhắn mới!" : originalTitle;
                        toggle = !toggle;
                    }, 800);
                }
            }
        });
    </script>
</body>
</html>
